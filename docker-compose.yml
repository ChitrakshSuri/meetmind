services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://meetmind:meetmind@postgres:5432/meetmind
    volumes:
      - .:/app

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: meetmind
      POSTGRES_USER: meetmind
      POSTGRES_PASSWORD: meetmind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meetmind"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
